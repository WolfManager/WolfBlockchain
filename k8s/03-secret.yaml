---
# Kubernetes Secret for Wolf Blockchain - Sensitive Data
# ⚠️ IMPORTANT: In production, use Azure Key Vault, AWS Secrets Manager, or Sealed Secrets
# This file is a safe template for source control - DO NOT store real secrets here
apiVersion: v1
kind: Secret
metadata:
  name: wolf-blockchain-secrets
  namespace: wolf-blockchain
  labels:
    app: wolf-blockchain
    component: secrets
type: Opaque
stringData:
  # SQL Server SA password (must meet SQL complexity requirements)
  SA_PASSWORD: "__SET_IN_CLUSTER_ONLY__"

  # Database Connection String
  ConnectionStrings__DefaultConnection: "__SET_IN_CLUSTER_ONLY__"

  # JWT Secret (must be 32+ characters)
  Jwt__Secret: "__SET_IN_CLUSTER_ONLY__"
  JWT_SECRET: "__SET_IN_CLUSTER_ONLY__"

  # Bootstrap Token for initial admin setup
  Security__BootstrapToken: "__SET_IN_CLUSTER_ONLY__"

  # Admin Allowed IPs (configure your admin IPs)
  Security__AdminAllowedIps__0: "__YOUR_STATIC_ADMIN_IP__"
  Security__AdminAllowedIps__1: "__YOUR_VPN_OR_BACKUP_ADMIN_IP__"

  # Allowed Origins for CORS
  Security__AllowedOrigins__0: "https://admin.your-domain.tld"
  Security__AllowedOrigins__1: "https://app.your-domain.tld"

  # RPC endpoints and credentials (sensitive)
  RPC_PRIMARY: "__SET_IN_CLUSTER_ONLY__"
  RPC_FALLBACK: "__SET_IN_CLUSTER_ONLY__"
  RPC_AUTH_TOKEN: "__SET_IN_CLUSTER_ONLY__"
  Blockchain__RpcApiKey: "__SET_IN_CLUSTER_ONLY__"

  # Wallet/keystore secrets
  Wallet__KeystorePassword: "__SET_IN_CLUSTER_ONLY__"
  WALLET_PRIVATE_CONFIG: "__SET_IN_CLUSTER_ONLY__"

  # AI provider secrets
  AI__ApiKey: "__SET_IN_CLUSTER_ONLY__"

  # Cache and queue credentials (if used)
  Cache__RedisPassword: "__SET_IN_CLUSTER_ONLY__"
  Queue__ConnectionString: "__SET_IN_CLUSTER_ONLY__"

  # API Key for external services (if needed)
  ExternalServices__ApiKey: "__SET_IN_CLUSTER_ONLY__"
  AUTH_SERVICE_TOKEN: "__SET_IN_CLUSTER_ONLY__"

  # Token Secret for legacy support
  WOLF_TOKEN_SECRET: "__SET_IN_CLUSTER_ONLY__"

---
# Alternative: Using base64 encoded secrets (less secure, not recommended)
# apiVersion: v1
# kind: Secret
# metadata:
#   name: wolf-blockchain-secrets-base64
#   namespace: wolf-blockchain
