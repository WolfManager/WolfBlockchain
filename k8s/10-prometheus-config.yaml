---
# ConfigMap for Prometheus Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: wolf-blockchain
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'wolf-blockchain-prod'
        environment: 'production'
    
    alerting:
      alertmanagers:
      - static_configs:
        - targets:
          - alertmanager:9093
    
    rule_files:
      - '/etc/prometheus/rules/*.yml'
    
    scrape_configs:
    # Prometheus itself
    - job_name: 'prometheus'
      static_configs:
      - targets: ['localhost:9090']
    
    # Kubernetes API Server
    - job_name: 'kubernetes-apiservers'
      kubernetes_sd_configs:
      - role: endpoints
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https
    
    # Kubernetes Nodes
    - job_name: 'kubernetes-nodes'
      kubernetes_sd_configs:
      - role: node
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
    
    # Wolf Blockchain API Pods
    - job_name: 'wolf-blockchain-api'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - wolf-blockchain
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: 'true'
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name
    
    # SQL Server (via external exporter if available)
    - job_name: 'wolf-blockchain-db'
      static_configs:
      - targets: ['wolf-blockchain-db:1433']
      relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  alerts.yml: |
    groups:
    - name: wolf-blockchain
      interval: 30s
      rules:
      
      # API Pod Health
      - alert: PodCrashLooping
        expr: |
          rate(kube_pod_container_status_restarts_total{pod=~"wolf-blockchain-api-.*"}[1h]) > 0
        for: 5m
        annotations:
          summary: "Wolf Blockchain API Pod is crash looping"
          description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in the last hour"
      
      # High CPU Usage
      - alert: HighCPUUsage
        expr: |
          (sum(rate(container_cpu_usage_seconds_total{pod=~"wolf-blockchain-api-.*"}[5m])) by (pod) / 1) > 0.8
        for: 5m
        annotations:
          summary: "High CPU usage on Wolf Blockchain API"
          description: "Pod {{ $labels.pod }} CPU usage is {{ $value | humanizePercentage }}"
      
      # High Memory Usage
      - alert: HighMemoryUsage
        expr: |
          (sum(container_memory_working_set_bytes{pod=~"wolf-blockchain-api-.*"}) by (pod) / 1Gi) > 0.85
        for: 5m
        annotations:
          summary: "High memory usage on Wolf Blockchain API"
          description: "Pod {{ $labels.pod }} memory usage is {{ $value | humanize }}Gi"
      
      # Database Connection Issues
      - alert: DatabaseConnectionErrors
        expr: |
          rate(sql_client_connection_errors_total{}[5m]) > 0
        for: 3m
        annotations:
          summary: "Database connection errors detected"
          description: "Rate of database errors: {{ $value }} per second"
      
      # High HTTP Error Rate
      - alert: HighHTTPErrorRate
        expr: |
          (sum(rate(http_requests_total{job="wolf-blockchain-api", status=~"5.."}[5m])) / sum(rate(http_requests_total{job="wolf-blockchain-api"}[5m]))) > 0.05
        for: 5m
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "Error rate: {{ $value | humanizePercentage }}"
      
      # Slow Requests
      - alert: SlowRequestResponse
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        annotations:
          summary: "Slow request response times"
          description: "95th percentile response time: {{ $value }}s"
      
      # Database Pod Not Ready
      - alert: DatabasePodNotReady
        expr: |
          kube_pod_status_ready{pod=~"wolf-blockchain-db-.*",condition="true"} == 0
        for: 5m
        annotations:
          summary: "Database pod is not ready"
          description: "Pod {{ $labels.pod }} is not ready"
      
      # Low Available Replicas
      - alert: LowReplicaCount
        expr: |
          kube_deployment_status_replicas_available{deployment="wolf-blockchain-api"} < 2
        for: 5m
        annotations:
          summary: "Low number of available replicas"
          description: "Only {{ $value }} replica(s) available, minimum 2 required"
