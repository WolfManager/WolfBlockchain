---
# Deployment for Wolf Blockchain API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wolf-blockchain-api
  namespace: wolf-blockchain
  labels:
    app: wolf-blockchain
    component: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: wolf-blockchain
      component: api
  template:
    metadata:
      labels:
        app: wolf-blockchain
        component: api
        version: "2.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: wolf-blockchain-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      containers:
      - name: api
        image: wolfblockchain:v2.0.0
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 5000
          protocol: TCP
        
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ASPNETCORE_URLS
          value: "http://+:5000"
        
        # Load configuration from ConfigMap
        envFrom:
        - configMapRef:
            name: wolf-blockchain-config
        - secretRef:
            name: wolf-blockchain-secrets
        
        # Resource requests and limits
        resources:
          requests:
            memory: "384Mi"
            cpu: "200m"
          limits:
            memory: "768Mi"
            cpu: "500m"
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        startupProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
        
        # Security context for container
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        
        # Volume mounts
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: tmp
          mountPath: /tmp
      
      # Volumes
      volumes:
      - name: logs
        persistentVolumeClaim:
          claimName: wolf-blockchain-logs-pvc
      - name: tmp
        emptyDir: {}
      
      # Node affinity - prefer nodes with more resources
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - wolf-blockchain
              topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 50
            preference:
              matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                - linux

---
# ServiceAccount for Wolf Blockchain API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wolf-blockchain-api
  namespace: wolf-blockchain
  labels:
    app: wolf-blockchain
    component: api

---
# Role for Wolf Blockchain API (if using RBAC)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wolf-blockchain-api
  namespace: wolf-blockchain
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]

---
# RoleBinding for Wolf Blockchain API
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wolf-blockchain-api
  namespace: wolf-blockchain
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wolf-blockchain-api
subjects:
- kind: ServiceAccount
  name: wolf-blockchain-api
  namespace: wolf-blockchain
