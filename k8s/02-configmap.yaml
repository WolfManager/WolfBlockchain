---
# ConfigMap for Wolf Blockchain Application Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: wolf-blockchain-config
  namespace: wolf-blockchain
  labels:
    app: wolf-blockchain
    component: configuration
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:5000"
  WolfBlockchain__Environment: "Production"
  WolfBlockchain__ApiUrl: "https://api.example.com"
  WolfBlockchain__ApiVersion: "1.0.0"
  WolfBlockchain__EnableMetrics: "true"
  WolfBlockchain__EnableSwagger: "false"
  WolfBlockchain__EnableHealthCheck: "true"
  Database__AutoMigrate: "true"
  Database__ConnectionTimeout: "30"
  Database__CommandTimeout: "120"
  Performance__EnableMetricsCollection: "true"
  Performance__SlowRequestThresholdMs: "1000"
  Performance__SlowQueryThresholdMs: "100"
  Performance__MetricsRetentionDays: "30"
  Monitoring__EnableHealthCheck: "true"
  Monitoring__EnableDetailedErrors: "false"
  Monitoring__LogSensitiveData: "false"
  Security__SingleAdminMode: "true"
  Security__OwnerAddress: "WOLFADMIN"
  Security__EnableHttpsRedirect: "true"
  Security__RequireHttps: "true"
  Security__MaxFailedAttempts: "5"
  Security__LoginLockoutMinutes: "30"
  Security__BlockDurationMinutes: "15"
  Security__SecretRotationIntervalHours: "24"
  Jwt__ExpirationMinutes: "60"
  Jwt__RefreshTokenExpirationDays: "7"
  Logging__LogLevel__Default: "Information"
  Logging__LogLevel__Microsoft_AspNetCore: "Warning"
  Logging__LogLevel__Microsoft_EntityFrameworkCore: "Warning"

  # Blockchain/RPC environment
  Blockchain__Network: "staging"
  Blockchain__RpcUrl: "https://rpc.your-network.tld"
  Blockchain__RpcTimeoutSeconds: "30"

  # Wallet environment (non-secret values only)
  Wallet__KeystorePath: "/app/secrets/wallet"
  Wallet__DefaultAddress: ""

  # AI service environment (non-secret values only)
  AI__Provider: "openai"
  AI__Endpoint: "https://api.openai.com/v1"
  AI__Model: "gpt-4o-mini"

  # Cache / queue endpoints (non-secret values only)
  Cache__RedisHost: "redis"
  Cache__RedisPort: "6379"
  Queue__Provider: "none"
  Queue__Host: ""
