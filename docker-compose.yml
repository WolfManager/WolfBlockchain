# ============================================
# 🐺 WOLF BLOCKCHAIN - DOCKER COMPOSE
# ============================================
# Production-ready multi-container setup
# API + SQL Server + Network + Volumes

version: '3.8'

services:
  # ============= WOLF BLOCKCHAIN API =============
  api:
    image: wolfblockchain:latest
    container_name: wolf-blockchain-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
      - "5443:5443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Server=db;Database=WolfBlockchainDb;User=sa;Password=WolfBlockchain@2024!;TrustServerCertificate=True;MultipleActiveResultSets=true
      - Jwt__Secret=WolfBlockchainProductionSecretKey2024MinimumThirtyTwoCharacters!
      - Jwt__ExpirationMinutes=60
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wolf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============= SQL SERVER DATABASE =============
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: wolf-blockchain-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=WolfBlockchain@2024!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - wolf-sqldata:/var/opt/mssql
    networks:
      - wolf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P WolfBlockchain@2024! -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

# ============= VOLUMES =============
volumes:
  wolf-sqldata:
    driver: local
    name: wolf-blockchain-sqldata

# ============= NETWORKS =============
networks:
  wolf-network:
    driver: bridge
    name: wolf-blockchain-network
